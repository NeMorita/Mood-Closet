<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Closet · Caja de Feria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --crema:#F4EFE6;--papel:#FBF8F2;--tinta:#241E1C;--vino:#7A2230;
  --vino-claro:#A24251;--rosa:#D9B8B0;--verde:#3B6B4F;--oro:#B8893B;
  --linea:#E0D7C8;--gris:#8C8278;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--crema);color:var(--tinta);line-height:1.5;-webkit-font-smoothing:antialiased}
::selection{background:var(--vino);color:var(--crema)}

.syncbar{display:flex;align-items:center;gap:10px;padding:9px 28px;font-size:12.5px;font-weight:600;
  background:var(--tinta);color:rgba(244,239,230,.7);position:sticky;top:0;z-index:50}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:.3s;background:#888}
.dot.ok{background:#5cb85c;box-shadow:0 0 6px #5cb85c}
.dot.err{background:#d9534f}
.dot.spin{background:var(--oro);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.app{display:grid;grid-template-columns:1fr 372px;min-height:calc(100vh - 36px)}
.left{min-width:0}
.cart-col{background:var(--tinta);color:var(--crema);position:sticky;top:36px;
  height:calc(100vh - 36px);display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.15)}

header{background:var(--tinta);color:var(--crema);padding:26px 30px 22px;position:relative;overflow:hidden}
header::after{content:'';position:absolute;right:-50px;top:-50px;width:200px;height:200px;
  border:1px solid rgba(244,239,230,.1);border-radius:50%}
.brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(24px,4vw,36px);letter-spacing:-.02em}
.brand .tag{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--rosa);font-weight:600}
.sub{margin-top:8px;font-size:13px;color:rgba(244,239,230,.6);max-width:520px}

.tabs{display:flex;gap:2px;padding:0 30px;background:var(--tinta);position:sticky;top:36px;z-index:40;flex-wrap:wrap}
.tab{appearance:none;border:none;background:transparent;cursor:pointer;font-family:'Inter';
  font-size:13px;font-weight:600;color:rgba(244,239,230,.5);padding:13px 16px 15px;
  border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--crema)}
.tab.active{color:var(--crema);border-bottom-color:var(--vino-claro)}
.tab .pill{display:inline-block;margin-left:5px;font-family:'JetBrains Mono';font-size:10px;
  background:rgba(244,239,230,.12);padding:2px 6px;border-radius:20px;vertical-align:middle}
.tab.active .pill{background:var(--vino)}

.wrap{padding:22px 30px 60px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.search{flex:1;min-width:190px;position:relative}
.search input{width:100%;font-family:'Inter';font-size:14px;padding:10px 14px 10px 38px;
  border:1px solid var(--linea);border-radius:10px;background:var(--papel);color:var(--tinta);transition:.15s}
.search input:focus{outline:none;border-color:var(--vino-claro);box-shadow:0 0 0 3px rgba(122,34,48,.08)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4}
.filtros{display:flex;gap:5px;flex-wrap:wrap}
.chip{appearance:none;border:1px solid var(--linea);background:var(--papel);cursor:pointer;
  font-family:'Inter';font-size:12px;font-weight:500;color:var(--gris);padding:7px 12px;
  border-radius:30px;transition:.15s;white-space:nowrap}
.chip:hover{border-color:var(--vino-claro);color:var(--vino)}
.chip.on{background:var(--vino);border-color:var(--vino);color:var(--crema)}
.chip.estado{border-style:dashed}
.addprod{appearance:none;border:1px solid var(--vino);background:var(--vino);color:#fff;cursor:pointer;
  font-family:'Inter';font-weight:600;font-size:13px;padding:9px 15px;border-radius:10px;transition:.15s;white-space:nowrap}
.addprod:hover{background:var(--vino-claro)}

.sellerhead{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.avatar{width:48px;height:48px;border-radius:50%;background:var(--vino);color:var(--crema);
  display:flex;align-items:center;justify-content:center;font-family:'Fraunces';font-weight:600;font-size:18px;flex-shrink:0}
.sellerhead h2{font-family:'Fraunces',serif;font-weight:600;font-size:23px;letter-spacing:-.01em}
.sellerhead .meta{font-size:13px;color:var(--gris)}
.minis{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.mini{background:var(--papel);border:1px solid var(--linea);border-radius:12px;padding:8px 14px;text-align:right;min-width:90px}
.mini .lbl{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--gris);font-weight:600}
.mini .val{font-family:'Fraunces',serif;font-weight:600;font-size:17px;margin-top:2px}
.mini.eft .val{color:var(--verde)}
.mini.tr  .val{color:var(--oro)}

.grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
.item{background:var(--papel);border:1px solid var(--linea);border-radius:13px;padding:13px 14px;
  display:flex;flex-direction:column;transition:.15s}
.item.vendido{border-color:var(--verde);background:linear-gradient(180deg,rgba(59,107,79,.06),var(--papel))}
.item.incart{border-color:var(--vino);box-shadow:0 0 0 2px rgba(122,34,48,.15)}
.nom{font-weight:600;font-size:14px;line-height:1.3}
.det{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;
  background:var(--crema);color:var(--gris);border:1px solid var(--linea)}
.badge.cat{background:rgba(122,34,48,.07);color:var(--vino);border-color:rgba(122,34,48,.15)}
.badge.sold{background:var(--verde);color:#fff;border-color:var(--verde)}
.badge.nuevo{background:rgba(184,137,59,.13);color:var(--oro);border-color:rgba(184,137,59,.3)}
.foot{margin-top:auto;padding-top:11px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.precio{font-family:'Fraunces',serif;font-weight:600;font-size:17px;white-space:nowrap}
.add{appearance:none;border:1px solid var(--vino);background:transparent;color:var(--vino);cursor:pointer;
  font-family:'Inter';font-weight:600;font-size:12px;padding:8px 13px;border-radius:9px;transition:.15s;white-space:nowrap}
.add:hover,.add.incart{background:var(--vino);color:#fff}
.add.undo{border-color:var(--gris);color:var(--gris)}
.add.undo:hover{background:var(--gris);color:#fff}
.soldby{font-size:11px;color:var(--gris);margin-top:6px}

.prodform{max-height:0;overflow:hidden;transition:max-height .28s ease,margin .28s;margin:0}
.prodform.open{max-height:440px;margin:0 0 18px}
.pf-grid{background:var(--papel);border:1px solid var(--linea);border-radius:13px;padding:16px;
  display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pf-field{display:flex;flex-direction:column;gap:4px}
.pf-field label{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--gris);font-weight:600}
.pf-field input{font-family:'Inter';font-size:13px;padding:9px 11px;border:1px solid var(--linea);
  border-radius:9px;background:var(--crema);color:var(--tinta)}
.pf-field input:focus{outline:none;border-color:var(--vino-claro)}
.pf-field input:disabled{opacity:.6}
.pf-actions{display:flex;gap:8px;margin-top:10px}
.pf-save{appearance:none;border:none;background:var(--vino);color:#fff;cursor:pointer;
  font-family:'Inter';font-weight:600;font-size:13px;padding:10px 20px;border-radius:9px;transition:.15s}
.pf-save:hover{background:var(--vino-claro)}
.pf-cancel{appearance:none;border:1px solid var(--linea);background:transparent;color:var(--gris);
  cursor:pointer;font-family:'Inter';font-weight:600;font-size:13px;padding:10px 18px;border-radius:9px;transition:.15s}
.pf-cancel:hover{border-color:var(--vino);color:var(--vino)}
@media(max-width:560px){.pf-grid{grid-template-columns:1fr}}

.cart-h{padding:20px 22px 14px;border-bottom:1px solid rgba(244,239,230,.12)}
.cart-h .ct{font-family:'Fraunces';font-weight:600;font-size:20px;display:flex;align-items:center;gap:8px}
.cnt{font-family:'JetBrains Mono';font-size:11px;background:var(--vino);padding:3px 8px;border-radius:20px}
.hint{font-size:11px;color:rgba(244,239,230,.48);margin-top:3px}
.cart-items{flex:1;overflow-y:auto;padding:8px 14px}
.cart-items::-webkit-scrollbar{width:6px}
.cart-items::-webkit-scrollbar-thumb{background:rgba(244,239,230,.18);border-radius:10px}
.ci{display:flex;gap:9px;padding:10px 6px;border-bottom:1px solid rgba(244,239,230,.07);align-items:flex-start}
.cinfo{flex:1;min-width:0}
.cn{font-size:13px;font-weight:600;line-height:1.2}
.cm{font-size:11px;color:rgba(244,239,230,.48);margin-top:2px}
.cp{font-family:'JetBrains Mono';font-size:13px;font-weight:600;white-space:nowrap}
.rem{appearance:none;border:none;background:transparent;color:rgba(244,239,230,.38);
  cursor:pointer;font-size:18px;line-height:1;padding:0 2px;transition:.15s}
.rem:hover{color:var(--rosa)}
.cart-empty{text-align:center;padding:48px 20px;color:rgba(244,239,230,.4);font-size:13px}
.cart-empty .ico{font-size:32px;opacity:.35;margin-bottom:10px}
.cart-f{border-top:1px solid rgba(244,239,230,.12);padding:14px 20px 18px}
.paysel{display:flex;gap:7px;margin-bottom:11px}
.paysel button{flex:1;appearance:none;border:1px solid rgba(244,239,230,.2);background:transparent;
  color:rgba(244,239,230,.65);cursor:pointer;font-family:'Inter';font-weight:600;font-size:13px;
  padding:10px;border-radius:10px;transition:.15s}
.paysel button.on{background:var(--crema);color:var(--tinta);border-color:var(--crema)}
.totrow{display:flex;justify-content:space-between;align-items:baseline;margin:5px 0 13px}
.totrow .tl{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:rgba(244,239,230,.5);font-weight:600}
.totrow .tv{font-family:'Fraunces';font-weight:700;font-size:28px;color:var(--rosa)}
.finbtn{width:100%;appearance:none;border:none;background:var(--vino);color:#fff;cursor:pointer;
  font-family:'Inter';font-weight:700;font-size:15px;padding:13px;border-radius:10px;transition:.15s}
.finbtn:hover{background:var(--vino-claro)}
.finbtn:disabled{background:rgba(244,239,230,.1);color:rgba(244,239,230,.3);cursor:not-allowed}
.clearcart{width:100%;appearance:none;border:none;background:transparent;
  color:rgba(244,239,230,.4);cursor:pointer;font-size:12px;font-weight:600;padding:8px;margin-top:4px}
.clearcart:hover{color:var(--rosa)}

.dashgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:20px}
.dcard{background:var(--papel);border:1px solid var(--linea);border-radius:14px;padding:18px 20px}
.dcard .dh{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dcard .av{width:34px;height:34px;border-radius:50%;background:var(--vino);color:var(--crema);
  display:flex;align-items:center;justify-content:center;font-family:'Fraunces';font-weight:600;font-size:13px}
.dcard h3{font-family:'Fraunces';font-weight:600;font-size:16px}
.drow{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--linea)}
.drow:last-child{border-bottom:none}
.drow .k{color:var(--gris)}
.drow .vv{font-weight:600;font-family:'JetBrains Mono';font-size:12px}
.drow.tot{margin-top:3px;padding-top:7px;border-top:2px solid var(--tinta);border-bottom:none}
.drow.tot .vv{font-family:'Fraunces';font-size:15px;color:var(--vino)}
.gastos-box{background:var(--papel);border:1px solid var(--linea);border-radius:14px;padding:20px}
.gastos-box h3{font-family:'Fraunces';font-weight:600;font-size:17px;margin-bottom:12px}
.gline{display:flex;gap:7px;align-items:center;margin-bottom:8px}
.gln{flex:1;font-family:'Inter';font-size:13px;padding:7px 10px;border:1px solid var(--linea);
  border-radius:9px;background:var(--crema);color:var(--tinta)}
.gln:focus{outline:none;border-color:var(--vino-claro)}
.gnum{width:110px;font-family:'JetBrains Mono';font-size:13px;padding:7px 9px;
  border:1px solid var(--linea);border-radius:9px;background:var(--crema);text-align:right;color:var(--tinta)}
.gnum:focus{outline:none;border-color:var(--vino-claro)}
.gldel{appearance:none;border:none;background:transparent;color:var(--gris);cursor:pointer;font-size:19px;padding:0 3px;transition:.15s}
.gldel:hover{color:var(--vino)}
.addline{appearance:none;border:1px dashed var(--vino-claro);background:transparent;color:var(--vino);
  cursor:pointer;font-family:'Inter';font-weight:600;font-size:12px;padding:8px;border-radius:9px;
  width:100%;margin:3px 0 5px;transition:.15s}
.addline:hover{background:rgba(122,34,48,.06)}
.expbtn{appearance:none;border:1px solid var(--tinta);background:var(--tinta);color:var(--crema);
  cursor:pointer;font-family:'Inter';font-weight:600;font-size:13px;padding:10px 18px;border-radius:9px;transition:.15s}
.expbtn:hover{background:var(--vino);border-color:var(--vino)}

.empty{text-align:center;padding:48px 20px;color:var(--gris)}
.empty .big{font-family:'Fraunces';font-size:21px;color:var(--tinta);margin-bottom:5px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(18px);
  background:var(--verde);color:#fff;padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;
  box-shadow:0 6px 28px rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:.22s;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.cartbar{display:none}
@media(max-width:980px){
  .app{grid-template-columns:1fr}
  .cart-col{position:fixed;top:0;right:0;width:min(380px,90vw);height:100vh;z-index:120;
    transform:translateX(100%);transition:transform .26s ease}
  .cart-col.open{transform:translateX(0)}
  .cartbar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--tinta);
    color:var(--crema);padding:12px 18px;align-items:center;gap:12px;box-shadow:0 -4px 18px rgba(0,0,0,.18)}
  .cartbar .cbinfo{flex:1}
  .cartbar .cbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(244,239,230,.48);font-weight:600}
  .cartbar .cbv{font-family:'Fraunces';font-weight:700;font-size:21px;color:var(--rosa)}
  .cartbar .cbbtn{appearance:none;border:none;background:var(--vino);color:#fff;cursor:pointer;
    font-family:'Inter';font-weight:700;font-size:14px;padding:12px 20px;border-radius:10px}
  .wrap{padding-bottom:85px}
  .cart-close{display:block!important}
}
.cart-close{display:none;position:absolute;top:16px;right:16px;appearance:none;border:none;
  background:rgba(244,239,230,.1);color:var(--crema);cursor:pointer;width:32px;height:32px;
  border-radius:50%;font-size:17px}
@media(max-width:560px){
  .syncbar,.wrap{padding-left:16px;padding-right:16px}
  header{padding:20px 16px}
  .tabs{padding:0 8px}
  .tab{padding:10px 9px 12px;font-size:11.5px}
  .minis{margin-left:0;width:100%}
  .mini{flex:1}
  .wrap{padding:16px 16px 85px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

</div>

function syncStatus(state,msg){
  document.getElementById('syncDot').className='dot '+state;

// ── Supabase helpers ────────────────────────────────────────────────────────
function apiHeaders(){
  return {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};
}
function apiFetch(path,opts){
  return fetch(SUPA_URL+'/rest/v1/'+path, Object.assign({headers:apiHeaders()},opts||{}));
}

function loadAll(){
  return Promise.all([
    apiFetch('ventas?select=*').then(function(r){return r.json();}),
    apiFetch('gastos?select=*').then(function(r){return r.json();}),
    apiFetch('productos_custom?select=*').then(function(r){return r.json();})
  ]).then(function(results){
    // ventas
    sold={};
    (results[0]||[]).forEach(function(v){ sold[v.id]={pago:v.pago,fecha:v.fecha}; });
    // gastos
    gastosLibres=(results[1]||[]).map(function(g){return{gid:g.gid,nombre:g.nombre,monto:g.monto};});
    // custom products
    custom=(results[2]||[]);
    custom.forEach(function(it){
      it.custom=true;
      if(DATA[it.seller]&&!BYID[it.id]){ DATA[it.seller].push(it); BYID[it.id]=it; }
    });
    syncStatus('ok','Sincronizado con Supabase');
    render();
    startRealtime();
  }).catch(function(e){
    syncStatus('err','Error: '+e.message);
    render();
  });
}

function startRealtime(){
  sb.channel('feria')
    .on('postgres_changes',{event:'*',schema:'public',table:'ventas'},function(p){
      var v=p.new, old=p.old;
      if(p.eventType==='DELETE'){ delete sold[old.id]; }
      else { sold[v.id]={pago:v.pago,fecha:v.fecha}; }
      render();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'gastos'},function(){
      apiFetch('gastos?select=*').then(function(r){return r.json();}).then(function(rows){
        gastosLibres=rows.map(function(g){return{gid:g.gid,nombre:g.nombre,monto:g.monto};});
        render();
      });
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'productos_custom'},function(){
      apiFetch('productos_custom?select=*').then(function(r){return r.json();}).then(function(rows){
        SELLERS.forEach(function(s){ DATA[s]=DATA[s].filter(function(it){return !it.custom;}); });
        Object.keys(BYID).forEach(function(k){ if(BYID[k]&&BYID[k].custom) delete BYID[k]; });
        custom=rows;
        custom.forEach(function(it){
          it.custom=true;
          if(DATA[it.seller]&&!BYID[it.id]){ DATA[it.seller].push(it); BYID[it.id]=it; }
        });
        render();
      });
    })
    .subscribe();
}

function dbSell(ids,pagoVal){
  var fecha=new Date().toISOString();
  var rows=ids.map(function(id){return{id:id,pago:pagoVal,fecha:fecha};});
  apiFetch('ventas',{method:'POST',
    headers:Object.assign({'Prefer':'resolution=merge-duplicates'},apiHeaders()),
    body:JSON.stringify(rows)});
}
function dbUnsell(id){
  apiFetch('ventas?id=eq.'+encodeURIComponent(id),{method:'DELETE'});
}
function dbSaveGasto(gasto){
  apiFetch('gastos',{method:'POST',
    headers:Object.assign({'Prefer':'resolution=merge-duplicates'},apiHeaders()),
    body:JSON.stringify([{gid:gasto.gid,nombre:gasto.nombre,monto:gasto.monto||0}])});
}
function dbDeleteGasto(gid){
  apiFetch('gastos?gid=eq.'+encodeURIComponent(gid),{method:'DELETE'});
}
function dbSaveCustom(it){
  apiFetch('productos_custom',{method:'POST',
    headers:Object.assign({'Prefer':'resolution=merge-duplicates'},apiHeaders()),
    body:JSON.stringify([{id:it.id,seller:it.seller,p:it.p,t:it.t,m:it.m,c:it.c}])});
}

// ── Stats ───────────────────────────────────────────────────────────────────
function sellerStats(s){
  var vend=0,eft=0,tr=0,total=0;
  DATA[s].forEach(function(it){
    var st=sold[it.id];
    if(st){vend++;total+=it.m;if(st.pago==='Efectivo')eft+=it.m;else tr+=it.m;}
  });
  return{vend:vend,eft:eft,tr:tr,total:total};
}
function globalStats(){
  var g={vend:0,eft:0,tr:0,total:0};
  SELLERS.forEach(function(s){var x=sellerStats(s);g.vend+=x.vend;g.eft+=x.eft;g.tr+=x.tr;g.total+=x.total;});
  return g;
}
function totalGastos(){return gastosLibres.reduce(function(a,g){return a+(+g.monto||0);},0);}
function initials(s){return s.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){renderTabs();renderCart();current==='DASH'?renderDash():renderSeller(current);}

function renderTabs(){
  tabsEl.innerHTML='';
  function mk(id,lbl,n){
    var b=document.createElement('button');
    b.className='tab'+(current===id?' active':'');
    b.innerHTML=lbl+(n!=null?'<span class="pill">'+n+'</span>':'');
    b.onclick=function(){current=id;q='';catFilter='Todas';estadoFilter='Todos';render();};
    tabsEl.appendChild(b);
  }
  mk('DASH','Panel',null);
  SELLERS.forEach(function(s){mk(s,s+' ',DATA[s].length);});
}

}

  var srch=document.getElementById('srch');
  if(srch)srch.oninput=function(){
    q=srch.value;var p=srch.selectionStart;renderSeller(s);
    var n=document.getElementById('srch');if(n){n.focus();n.setSelectionRange(p,p);}
  };
  mainEl.querySelectorAll('.chip[data-cat]').forEach(function(c){
    c.onclick=function(){catFilter=c.dataset.cat;renderSeller(s);};
  });
  mainEl.querySelectorAll('.chip[data-est]').forEach(function(c){
    c.onclick=function(){estadoFilter=(estadoFilter===c.dataset.est?'Todos':c.dataset.est);renderSeller(s);};
  });
  mainEl.querySelectorAll('.item').forEach(function(card){
    var id=card.dataset.id,btn=card.querySelector('[data-act]');
    if(!btn)return;
    btn.onclick=function(){
      var act=btn.dataset.act;
      if(act==='add'){cart.push(id);toast('Agregado a la compra');}
      else if(act==='remove'){cart=cart.filter(function(x){return x!==id;});}
      else if(act==='undo'){dbUnsell(id);delete sold[id];toast('Venta deshecha');}
      renderSeller(s);renderCart();
    };
  });
  var addBtn=document.getElementById('addProd'),form=document.getElementById('prodForm');
  addBtn.onclick=function(){form.classList.toggle('open');if(form.classList.contains('open'))document.getElementById('pfNom').focus();};
  document.getElementById('pfCancel').onclick=function(){form.classList.remove('open');};
  document.getElementById('pfSave').onclick=function(){
    var nom=document.getElementById('pfNom').value.trim();
    var precio=+document.getElementById('pfPrecio').value||0;
    if(!nom){toast('Pone un nombre al producto');return;}
    if(precio<=0){toast('Pone un precio valido');return;}
    var it={
      id:'custom#'+Date.now()+'#'+Math.random().toString(36).slice(2,5),
      seller:s,p:nom,t:document.getElementById('pfTalle').value.trim(),
      m:precio,c:document.getElementById('pfCat').value.trim()||'Sin categoria',custom:true
    };
    custom.push(it);DATA[s].push(it);BYID[it.id]=it;
    dbSaveCustom(it);toast('Producto agregado a '+s);renderSeller(s);renderCart();
  };
}

function renderCart(){
  var items=cart.map(function(id){return BYID[id];}).filter(Boolean);
  var tot=items.reduce(function(a,it){return a+it.m;},0);
  document.getElementById('cartCnt').textContent=items.length;
  document.getElementById('cartTot').textContent=fmt(tot);
  document.getElementById('cbCnt').textContent=items.length;
  document.getElementById('cbTot').textContent=fmt(tot);
  var box=document.getElementById('cartItems');
  if(!items.length){
    box.innerHTML='<div class="cart-empty"><div class="ico">&#128722;</div>Carrito vacio.<br>Agrega productos desde cualquier vendedora.</div>';
  }else{
    box.innerHTML=items.map(function(it,i){
      return'<div class="ci"><div class="cinfo"><div class="cn">'+esc(it.p)+'</div>'
        +'<div class="cm">'+it.seller+(it.t?' &middot; '+esc(it.t):'')+'</div></div>'
        +'<span class="cp">'+fmt(it.m)+'</span>'
        +'<button class="rem" data-i="'+i+'">&#215;</button></div>';
    }).join('');
    box.querySelectorAll('.rem').forEach(function(b){
      b.onclick=function(){cart.splice(+b.dataset.i,1);renderCart();if(current!=='DASH')renderSeller(current);};
    });
  }
  document.getElementById('finBtn').disabled=!items.length;
}

function finalizar(){
  if(!cart.length)return;
  dbSell(cart,pago);
  cart.forEach(function(id){sold[id]={pago:pago,fecha:new Date().toISOString()};});
  var n=cart.length,tot=cart.map(function(id){return BYID[id].m;}).reduce(function(a,b){return a+b;},0);
  cart=[];
  toast('Compra cerrada &middot; '+n+' items &middot; '+fmt(tot)+' en '+pago.toLowerCase());
  closeCart();render();
}

document.getElementById('finBtn').onclick=finalizar;
document.getElementById('clearCart').onclick=function(){
  if(cart.length&&confirm('Vaciar el carrito sin cobrar?')){cart=[];renderCart();if(current!=='DASH')renderSeller(current);}
};
document.getElementById('payEft').onclick=function(){setPago('Efectivo');};
document.getElementById('payTr').onclick=function(){setPago('Transferencia');};
function setPago(p){
  pago=p;
  document.getElementById('payEft').classList.toggle('on',p==='Efectivo');
  document.getElementById('payTr').classList.toggle('on',p==='Transferencia');
}
var cartColEl=document.getElementById('cartCol');
function openCart(){cartColEl.classList.add('open');}
function closeCart(){cartColEl.classList.remove('open');}
document.getElementById('cbOpen').onclick=openCart;
document.getElementById('cartClose').onclick=closeCart;

var toastT;
function toast(msg){
  var t=document.getElementById('toast');
  t.innerHTML=msg;t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(function(){t.classList.remove('show');},2400);
}

function exportCSV(){
  var NL='\n';
  var csv='Vendedora,Producto,Talle,Categoria,Precio,Medio de pago,Fecha'+NL;
  SELLERS.forEach(function(s){
    DATA[s].forEach(function(it){
      var st=sold[it.id];
      if(st)csv+=[s,'"'+it.p.replace(/"/g,'""')+'"',it.t,it.c,it.m,st.pago,st.fecha].join(',')+NL;
    });
  });
  csv+=NL+'DETALLE DE GASTOS'+NL;
  gastosLibres.forEach(function(gx){if(gx.monto)csv+='"'+(gx.nombre||'Gasto').replace(/"/g,'""')+'",'+gx.monto+NL;});
  var g=globalStats(),tg=totalGastos();
  csv+=NL+'RESUMEN'+NL
    +'Prendas vendidas,'+g.vend+NL
    +'Efectivo,'+g.eft+NL
    +'Transferencia,'+g.tr+NL
    +'Gastos,'+tg+NL
    +'Caja final (efectivo-gastos),'+(g.eft-tg)+NL
    +'Venta total,'+g.total+NL;
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='mood_closet_ventas_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// ── Arrancar ────────────────────────────────────────────────────────────────
render();
loadAll();
</script>
